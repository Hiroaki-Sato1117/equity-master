function generateCbetExplanation(sc){
  const {hero,flop,action,textureId,handStrength,correctBet,correctSizing,wetness}=sc;
  const pot=action.potBB;
  const boardVals=flop.map(c=>rv(c)).sort((a,b)=>b-a);
  const heroVals=hero.map(c=>rv(c)).sort((a,b)=>b-a);
  const made=evaluateMadeHand(hero,flop);
  const SUIT_SYM={s:'♠',h:'♥',d:'♦',c:'♣'};
  const rvN=v=>v===14?'A':v===13?'K':v===12?'Q':v===11?'J':v===10?'T':String(v);

  // Board analysis
  const suitCounts={};
  flop.forEach(c=>{suitCounts[c.s]=(suitCounts[c.s]||0)+1;});
  const maxSuit=Math.max(...Object.values(suitCounts));
  const monoSuit=maxSuit===3?Object.keys(suitCounts).find(s=>suitCounts[s]===3):null;
  const twoToneSuit=maxSuit===2?Object.keys(suitCounts).find(s=>suitCounts[s]===2):null;
  const spread=boardVals[0]-boardVals[2];
  const rangeAdv=boardVals[0]>=11;
  const boardHighName=rvN(boardVals[0]);
  const bdInfo=hasBackdoorDraw(hero,flop);

  // Hero specifics
  const overcards=heroVals.filter(v=>v>boardVals[0]);
  const hasFlushBlocker=monoSuit?hero.some(c=>c.s===monoSuit):false;
  const isPocketPair=hero[0].r===hero[1].r;

  // Hero's flush draw check
  let heroHasFD=false, heroFDSuit=null;
  for(const s of new Set(hero.map(c=>c.s))){
    if((hero.filter(c=>c.s===s).length+flop.filter(c=>c.s===s).length)>=4){
      heroHasFD=true; heroFDSuit=s; break;
    }
  }
  // Hero's backdoor flush
  let heroBDFlush=false, heroBDSuit=null;
  if(!heroHasFD){
    for(const s of new Set(hero.map(c=>c.s))){
      if(hero.filter(c=>c.s===s).length>=2&&flop.filter(c=>c.s===s).length>=1){
        heroBDFlush=true; heroBDSuit=s; break;
      }
    }
  }

  // Possible draws on board (for others)
  const boardDraws=[];
  if(maxSuit>=2)boardDraws.push('フラッシュドロー');
  if(spread<=4)boardDraws.push('OESD');
  else if(spread<=6)boardDraws.push('ガットショット');

  // Hero's improvement outs & turn equity
  let outs=[];
  if(handStrength==='air'||handStrength==='weak'){
    overcards.forEach(v=>{outs.push({name:rvN(v)+'ヒット',count:3});});
    if(handStrength==='weak'){
      outs.push({name:'セット改善',count:2});
    }
    if(heroHasFD)outs.push({name:SUIT_SYM[heroFDSuit]+'フラッシュ完成',count:9});
    else if(heroBDFlush)outs.push({name:'BD'+SUIT_SYM[heroBDSuit]+'フラッシュ',count:2});
    // Backdoor straight (if hasBackdoorDraw returned true but no flush outs added)
    if(bdInfo&&!heroHasFD&&!heroBDFlush)outs.push({name:'BDストレート',count:2});
    else if(bdInfo&&heroBDFlush)outs.push({name:'BDストレート',count:1});
  }else if(handStrength==='draw'){
    if(heroHasFD)outs.push({name:SUIT_SYM[heroFDSuit]+'フラッシュ完成',count:9});
    const allV=[...new Set([...heroVals,...boardVals])].sort((a,b)=>a-b);
    let hasOE=false;
    for(let i=0;i<allV.length-3;i++){if(allV[i+3]-allV[i]<=4){
      const window=allV.filter(v=>v>=allV[i]&&v<=allV[i]+4);
      if(window.length>=4){hasOE=true;break;}
    }}
    if(hasOE)outs.push({name:'ストレート完成',count:heroHasFD?6:8});
    if(!heroHasFD&&!hasOE)outs.push({name:'ガットショット',count:4});
    if(overcards.length>0)outs.push({name:'オーバーカード'+rvN(overcards[0]),count:3});
  }else if(handStrength==='medium'){
    outs.push({name:'セット/ツーペア改善',count:5});
  }else if(handStrength==='strong'){
    outs.push({name:'さらなる改善',count:5});
  }
  const totalOuts=outs.reduce((s,o)=>s+o.count,0);
  const turnPct=totalOuts>0?Math.round(totalOuts/47*100):0;
  const riverPct=totalOuts>0?Math.round((1-((47-totalOuts)/47*(46-totalOuts)/46))*100):0;

  // Hero hand description
  const heroFeatures=[];
  if(overcards.length>0)heroFeatures.push(overcards.map(v=>rvN(v)).join('・')+'のオーバーカード');
  if(isPocketPair){
    const pv=rv(hero[0]);
    if(pv>boardVals[0])heroFeatures.push('オーバーペア');
    else if(pv<boardVals[2])heroFeatures.push('アンダーペア');
  }
  if(heroHasFD)heroFeatures.push(SUIT_SYM[heroFDSuit]+'フラッシュドロー');
  else if(heroBDFlush)heroFeatures.push('バックドア'+SUIT_SYM[heroBDSuit]+'フラッシュドロー');
  if(hasFlushBlocker&&monoSuit)heroFeatures.push(SUIT_SYM[monoSuit]+'フラッシュブロッカー');

  let h='';

  // ===== 1. あなたのハンド =====
  h+=`<div style="margin-bottom:16px">`;
  h+=`<div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px">あなたのハンド</div>`;
  h+=`<div style="font-size:13px;color:var(--text);line-height:1.7">`;
  h+=`<strong>${made.name}</strong>`;
  if(heroFeatures.length>0)h+=`（${heroFeatures.join('、')}）`;
  h+=`<br>`;
  if(totalOuts>0&&handStrength!=='monster'){
    h+=`<span style="color:var(--text3);font-size:12px">ターン改善: ${outs.map(o=>o.name+'('+o.count+')').join(' + ')} = <strong style="color:var(--text)">${totalOuts}アウツ → ターン${turnPct}% / リバーまで${riverPct}%</strong></span>`;
  }else if(handStrength==='monster'){
    h+=`<span style="color:var(--text3);font-size:12px">すでにレンジトップのハンド。バリューを最大化したい。</span>`;
  }else{
    h+=`<span style="color:var(--text3);font-size:12px">改善の見込みがほぼない。</span>`;
  }
  h+=`</div></div>`;

  // ===== 2. なぜこの判断か =====
  h+=`<div style="margin-bottom:16px">`;
  h+=`<div style="font-size:12px;font-weight:700;color:${correctBet?'var(--green)':'var(--red)'};margin-bottom:6px">${correctBet?'BET '+correctSizing+' pot の理由':'CHECK の理由'}</div>`;
  h+=`<div style="font-size:13px;color:var(--text2);line-height:1.8">`;

  const reasons=[];

  if(correctBet){
    // === BET reasoning ===
    // Core value/bluff reason
    if(handStrength==='monster'){
      reasons.push(`${made.name}はこのボードで非常に強い。相手のセカンドベストハンド（トップペア、オーバーペア等）からバリューを最大限に取る。`);
    }else if(handStrength==='strong'){
      reasons.push(`${made.name}はバリューベットの主力。相手のミドルペアやドローからベットを通じて利益を得る。`);
    }else if(handStrength==='medium'){
      if(textureId==='dry')reasons.push(`Dryボードではミディアムハンドでもベット可能。相手のドローが少なく、コールレンジが狭いため小さいベットで十分にfold equity（降ろす力）を確保できる。`);
      else reasons.push(`ミディアムハンドだが、このボードではプロテクションベットとして有効。相手のオーバーカードやドローに自由にカードを見せたくない。`);
    }else if(handStrength==='draw'){
      const drawNames=outs.filter(o=>o.name.includes('フラッシュ')||o.name.includes('ストレート')||o.name.includes('ガット')).map(o=>o.name);
      reasons.push(`${drawNames.join('+')||'ドロー'}を持っているため、セミブラフとしてベット。相手がフォールドすればポット${pot}bbを獲得、コールされてもリバーまで${riverPct}%で改善する。`);
    }else if(handStrength==='air'||handStrength==='weak'){
      if(bdInfo&&textureId==='dry'){
        reasons.push(`Dryボードで${heroBDFlush?'バックドアフラッシュドロー':'バックドアドロー'}がある。小さいベット(${correctSizing})でフォールドエクイティを狙いつつ、ターンで改善すれば続けてベットできる。`);
      }else if(textureId==='paired'){
        reasons.push(`ペアボードでは相手がヒットしにくく、レンジアドバンテージが大きい。弱いハンドでもブラフとして小さくC-betできる。`);
      }else{
        reasons.push(`レンジアドバンテージを活かしたブラフベット。相手のフォールドから利益を得る。`);
      }
    }

    // Sizing reason
    if(textureId==='dry'){
      reasons.push(`<strong>サイズ: ${correctSizing} pot</strong> — Dryボードはドローが少ないのでプロテクション不要。小さいベットで十分に相手の弱いハンドをフォールドさせられる。リスクが小さいので幅広いレンジでベット可能。`);
    }else if(textureId==='wet'){
      const mult=SIZING_MULT[correctSizing];
      const betBB=Math.round(pot*mult*10)/10;
      const tPot=pot+betBB*2;
      const reqEq=Math.round(betBB/tPot*1000)/10;
      reasons.push(`<strong>サイズ: ${correctSizing} pot (${betBB}bb)</strong> — Wetボードはドローが多い。大きめのサイズで相手に${reqEq}%のオッズを与え、ガットショット(17%)等の弱いドローを降ろす。${boardDraws.includes('フラッシュドロー')?'フラッシュドロー(35%)はコール可だが、こちらが強いハンドなのでコールされるほど利益的。':''}`);
    }else if(textureId==='semi_wet'){
      reasons.push(`<strong>サイズ: ${correctSizing} pot</strong> — Semi-wetはドローがそこそこ存在する。中サイズでバリュー兼プロテクション。`);
    }else if(textureId==='monotone'){
      reasons.push(`<strong>サイズ: ${correctSizing} pot</strong> — モノトーンボードでは大きいベットはフラッシュ完成手にしかコールされない。${hasFlushBlocker?SUIT_SYM[monoSuit]+'ブロッカーを持っているので相手のフラッシュの組み合わせが減り、小さくベットできる。':'小さいサイズで慎重に。'}`);
    }else if(textureId==='paired'){
      reasons.push(`<strong>サイズ: ${correctSizing} pot</strong> — ペアボードではレンジアドバンテージが大きい。小さいサイズで広くC-betが有効。`);
    }

    // Pot type specific
    if(action.type==='3BET'){
      reasons.push(`3BETポット(${pot}bb)ではSPRが低く、小さいベットでも相手のスタックに対して大きなプレッシャーになる。${rangeAdv?boardHighName+'ハイボードでは3betterのレンジにA/K/Qが集中しており有利。':''}`);
    }else if(action.multiway){
      reasons.push(`マルチウェイではブラフが効きにくいが、${handStrength==='monster'||handStrength==='strong'?'バリューハンド':'セミブラフ'}を持っているのでベットが正当化される。`);
    }

  }else{
    // === CHECK reasoning ===
    // Core reason - specific to hand strength
    if(handStrength==='air'){
      reasons.push(`${made.name}（ノーペア）でベットすると、コールしてくるのは${boardHighName}ヒット、オーバーペア、ドロー等の自分より強いハンド。フォールドしてくれるハンド（弱いAハイ等）にはそもそも勝っていることも多く、ベットの期待値が低い。`);
    }else if(handStrength==='weak'){
      reasons.push(`弱いペアでベットしてレイズされると、コール/フォールドの非常に難しい判断を迫られる。チェックしてポットを${pot}bbのままコントロールする方が安全。`);
    }else if(handStrength==='medium'){
      reasons.push(`${made.name}は強すぎもせず弱すぎもしないミディアムハンド。ベットすると相手は弱いハンドをフォールドし、強いハンドだけがコール/レイズしてくるため、自分にとって不利な状況を作ってしまう。`);
    }else if(handStrength==='strong'&&textureId==='monotone'&&!hasFlushBlocker){
      reasons.push(`${made.name}は通常ベット対象だが、モノトーンボード(${SUIT_SYM[monoSuit]}×3)で${SUIT_SYM[monoSuit]}を持っていない。相手がフラッシュ or フラッシュドローを持っている組み合わせが多く、ベットしてもコールされる相手に負けているケースが多い。`);
    }else if(handStrength==='draw'&&textureId==='monotone'&&!hasFlushBlocker){
      reasons.push(`モノトーンボードでフラッシュブロッカーがないドロー。セミブラフしても相手のフラッシュ系ハンドに対して効果が薄い。`);
    }

    // Position impact
    if(!action.heroIP){
      reasons.push(`OOP（先にアクション）では、チェックレンジに強さを持たせることがGTOで重要。このハンドをチェックレンジに含めることで、チェック後に相手がベットしてきた場合のディフェンスが安定する。`);
    }else{
      reasons.push(`IPでもこのハンド/ボードではポットコントロールが優先。ターンで改善しなければ相手のベットにフォールドでき、改善すればバリューベットに切り替えられる。`);
    }

    // Pot type specific
    if(action.type==='3BET'&&(handStrength==='air'||handStrength==='weak')){
      reasons.push(`3BETポット(${pot}bb)は既にポットが大きい。エアハンドでベットしてコール/レイズされると損失が一気に膨らむ。チェックして最小限のリスクに留める。`);
    }
    if(action.multiway){
      reasons.push(`マルチウェイポットでは少なくとも1人がヒットしている確率が高く、ブラフの成功率が著しく低い。`);
    }

    // Future plan
    if(totalOuts>0){
      reasons.push(`チェック後のプラン: ターンで改善(${turnPct}%)すればバリューベットに移行。改善しなければ相手のアクションを見て判断 or 低コストでギブアップ。`);
    }
  }

  // Render reasons
  reasons.forEach(r=>{
    h+=`<div style="margin-bottom:8px;padding:6px 10px;background:var(--bg2);border-radius:6px;border-left:2px solid var(--border)">${r}</div>`;
  });
  h+=`</div></div>`;

  // ===== 3. Sizing Math (bet時のみ、簡潔に) =====
  if(correctBet&&correctSizing){
    const mult=SIZING_MULT[correctSizing];
    const betBB=Math.round(pot*mult*10)/10;
    const tPot=pot+betBB*2;
    const reqEq=Math.round(betBB/tPot*1000)/10;

    // Only show draw table if board has draws
    const possDraws=[];
    if(maxSuit>=2)possDraws.push({name:'フラッシュドロー',eq:35});
    if(spread<=4)possDraws.push({name:'OESD',eq:32});
    if(spread<=6&&spread>2)possDraws.push({name:'ガットショット',eq:16});

    if(possDraws.length>0){
      h+=`<div>`;
      h+=`<div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:6px">相手のドロー vs このベットサイズ</div>`;
      h+=`<div style="font-size:12px;color:var(--text3);margin-bottom:6px">ベット${betBB}bb → 相手の必要エクイティ: <strong style="color:var(--red)">${reqEq}%</strong></div>`;
      h+=`<div style="display:flex;flex-wrap:wrap;gap:6px">`;
      possDraws.forEach(d=>{
        const canCall=d.eq>reqEq;
        h+=`<div style="padding:6px 10px;border-radius:6px;font-size:11px;font-weight:600;background:${canCall?'var(--goldBg,rgba(255,200,0,0.1))':'var(--greenBg,rgba(0,200,0,0.1))'};border:1px solid ${canCall?'var(--gold)':'var(--green)'};color:${canCall?'var(--gold)':'var(--green)'}">`;
        h+=`${d.name}(${d.eq}%) → ${canCall?'コール可':'フォールド'}`;
        h+=`</div>`;
      });
      h+=`</div>`;

      // Key insight for strong hands when draws can call
      const fd=possDraws.find(d=>d.name==='フラッシュドロー');
      if(fd&&fd.eq>reqEq&&(handStrength==='strong'||handStrength==='monster')){
        h+=`<div style="margin-top:8px;padding:8px 10px;background:var(--bg2);border-radius:6px;font-size:12px;color:var(--text3)">`;
        h+=`フラッシュドローにコールされても問題ない — あなたのハンドは~${100-fd.eq}%で勝っており、コールされるほど期待値プラス。`;
        h+=`</div>`;
      }
      h+=`</div>`;
    }
  }

  return h;
}

function renderCbetResult(el){
  const sc=CB.currentScenario;
  const texCorrect=CB._userTexture===sc.textureId;
  const betCorrect=CB._userBetDecision===sc.correctBet;
  const correctTex=BOARD_TEXTURES.find(b=>b.id===sc.textureId);
  const userTex=BOARD_TEXTURES.find(b=>b.id===CB._userTexture);

  const score=scoreCbetQuestion(CB._userTexture,sc.textureId,CB._userBetDecision,sc.correctBet,CB._userSizing,sc.correctSizing);

  let h=renderCbetProgress();
  h+=renderCbetContext(sc);
  h+=renderCbetCards(sc);

  // Score badge
  const scorePct=Math.round(score.earned/score.maxPts*100);
  const scoreClr=scorePct>=80?'var(--green)':scorePct>=40?'var(--gold)':'var(--red)';
  h+=`<div style="text-align:center;margin:12px 0"><span style="font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:800;color:${scoreClr}">${score.earned}/${score.maxPts}</span><span style="font-size:12px;color:var(--text3);margin-left:6px">pts</span></div>`;

  // 1. Texture result
  h+=`<div class="result-box ${texCorrect?'correct-box':'wrong-box'}">`;
  h+=`<div class="result-title">1. Board Texture (1pt)</div>`;
  h+=`<div class="result-detail">`;
  h+=`Your: <strong>${userTex.label}</strong> | Correct: <strong>${correctTex.label}</strong>`;
  if(texCorrect)h+=` <span style="color:var(--green)">\u2713 +1</span>`;
  else h+=` <span style="color:var(--red)">\u2717 +0</span>`;
  h+=`</div></div>`;

  // 2. Bet/Check result
  h+=`<div class="result-box ${betCorrect?'correct-box':'wrong-box'}">`;
  h+=`<div class="result-title">2. C-bet Decision (2pts)</div>`;
  h+=`<div class="result-detail">`;
  h+=`Your: <strong>${CB._userBetDecision?'C-BET':'CHECK'}</strong> | Correct: <strong>${sc.correctBet?'C-BET':'CHECK'}</strong>`;
  if(betCorrect)h+=` <span style="color:var(--green)">\u2713 +2</span>`;
  else h+=` <span style="color:var(--red)">\u2717 +0</span>`;
  h+=`</div></div>`;

  // 3. Sizing result
  if(sc.correctBet){
    const szCorrect=CB._userSizing===sc.correctSizing;
    const szAdjacent=!szCorrect&&CB._userSizing&&isAdjacentSz(CB._userSizing,sc.correctSizing);
    const szPts=szCorrect?2:szAdjacent?1:0;
    const szBox=szCorrect?'correct-box':szAdjacent?'correct-box':'wrong-box';
    h+=`<div class="result-box ${szBox}">`;
    h+=`<div class="result-title">3. Sizing (2pts)</div>`;
    h+=`<div class="result-detail">`;
    if(CB._userBetDecision){
      h+=`Your: <strong>${CB._userSizing||'N/A'}</strong> | Correct: <strong>${sc.correctSizing}</strong>`;
      if(szCorrect)h+=` <span style="color:var(--green)">\u2713 +2</span>`;
      else if(szAdjacent)h+=` <span style="color:var(--gold)">\u2248 +1 (隣接)</span>`;
      else h+=` <span style="color:var(--red)">\u2717 +0</span>`;
    }else{
      h+=`<span style="color:var(--text3)">C-BETを選択しなかったためスキップ</span>`;
    }
    h+=`</div></div>`;
  }else if(!CB._userBetDecision){
    h+=`<div class="result-box correct-box">`;
    h+=`<div class="result-title">3. Sizing (2pts)</div>`;
    h+=`<div class="result-detail"><span style="color:var(--green)">\u2713 +2</span> CHECK正解 — サイジング自動付与</div>`;
    h+=`</div>`;
  }else{
    h+=`<div class="result-box wrong-box">`;
    h+=`<div class="result-title">3. Sizing (2pts)</div>`;
    h+=`<div class="result-detail"><span style="color:var(--red)">\u2717 +0</span> 正解はCHECK — ベットは不要</div>`;
    h+=`</div>`;
  }

  // Detailed explanation
  h+=`<div style="margin-top:16px;padding:16px;background:var(--bg2);border-radius:12px;border:1px solid var(--border)">`;
  h+=`<div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:12px;letter-spacing:-.3px">Strategy Breakdown</div>`;
  h+=generateCbetExplanation(sc);
  h+=`</div>`;

  // Store result
  const res={
    hero:sc.hero,flop:sc.flop,action:sc.action.id,
    correctTexture:sc.textureId,userTexture:CB._userTexture,
    correctBet:sc.correctBet,userBet:CB._userBetDecision,
    correctSizing:sc.correctSizing,userSizing:CB._userSizing,
    earned:score.earned,maxPts:score.maxPts,explanation:sc.explanation,
    handStrength:sc.handStrength
  };

  h+=`<div style="display:flex;gap:8px;margin-top:20px;justify-content:center">`;
  h+=`<button class="btn btn-p" onclick="nextCbetHand()">Next Hand</button>`;
  h+=`</div>`;
  el.innerHTML=h;

  // Save result if not already saved for this index
  if(CB.results.length<=CB.currentIdx){
    CB.results.push(res);
  }
}

function isAdjacentSz(a,b){
  const ai=SIZING_OPTIONS.indexOf(a),bi=SIZING_OPTIONS.indexOf(b);
  return ai>=0&&bi>=0&&Math.abs(ai-bi)<=1;
}

function nextCbetHand(){
  CB.currentIdx++;
  CB._userTexture=null;
  CB._userBetDecision=null;
  CB._userSizing=null;

  if(CB.currentIdx>=CB.scenarios.length){
    CB.phase='set_complete';
    completeCbetSet();
    playSound('complete');
  }else{
    CB.currentScenario=CB.scenarios[CB.currentIdx];
    CB.phase='show_scenario';
    playSound('deal');
  }
  rCbet();
}

function completeCbetSet(){
  const totalEarned=CB.results.reduce((s,r)=>s+r.earned,0);
  const totalMax=CB.results.reduce((s,r)=>s+r.maxPts,0);
  const pct=totalMax>0?Math.round(totalEarned/totalMax*100):0;
  const elapsed=Math.round((Date.now()-CB.startTime)/1000);

  const setRecord={
    id:Date.now(),date:td(),handsCount:CB.scenarios.length,
    score:pct,earned:totalEarned,maxPts:totalMax,elapsed,
    results:CB.results.map(r=>({
      hero:r.hero,flop:r.flop,action:r.action,
      correctTexture:r.correctTexture,userTexture:r.userTexture,
      correctBet:r.correctBet,userBet:r.userBet,
      correctSizing:r.correctSizing,userSizing:r.userSizing,
      earned:r.earned,maxPts:r.maxPts,explanation:r.explanation,
      handStrength:r.handStrength
    }))
  };

  D.cbetSets.push(setRecord);

  const key=td();
  if(!D.dailyLog[key])D.dailyLog[key]={sets:0,questions:0,correct:0};
  if(!D.dailyLog[key].cbetSets)D.dailyLog[key].cbetSets=0;
  if(!D.dailyLog[key].cbetQuestions)D.dailyLog[key].cbetQuestions=0;
  if(!D.dailyLog[key].cbetCorrect)D.dailyLog[key].cbetCorrect=0;
  D.dailyLog[key].cbetSets++;
  D.dailyLog[key].cbetQuestions+=totalMax;
  D.dailyLog[key].cbetCorrect+=totalEarned;

  save();
  if(pct>=80)setTimeout(fireConfetti,300);
}

function renderCbetSetComplete(el){
  const totalEarned=CB.results.reduce((s,r)=>s+r.earned,0);
  const totalMax=CB.results.reduce((s,r)=>s+r.maxPts,0);
  const pct=totalMax>0?Math.round(totalEarned/totalMax*100):0;
  const elapsed=Math.round((Date.now()-CB.startTime)/1000);
  const mins=Math.floor(elapsed/60),secs=elapsed%60;

  let cls='ok';
  if(pct>=80)cls='great';else if(pct<50)cls='poor';

  let h=`<div class="set-summary">`;
  h+=`<div style="font-size:48px;margin-bottom:8px">${pct>=80?'\uD83C\uDFC6':pct>=50?'\uD83D\uDCAA':'\uD83D\uDCDA'}</div>`;
  h+=`<div style="font-size:18px;font-weight:700;margin-bottom:4px">C-BET Set Complete!</div>`;
  h+=`<div class="set-score ${cls}">${pct}%</div>`;
  h+=`<div style="font-size:13px;color:var(--text2);margin-bottom:4px">${totalEarned} / ${totalMax} pts</div>`;
  h+=`<div style="font-size:12px;color:var(--text3);margin-bottom:20px">Time: ${mins}m ${String(secs).padStart(2,'0')}s</div>`;

  h+=`<div style="text-align:left;margin-top:16px">`;
  CB.results.forEach((r,i)=>{
    const rpct=r.maxPts>0?Math.round(r.earned/r.maxPts*100):0;
    const tex=BOARD_TEXTURES.find(b=>b.id===r.correctTexture);
    h+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">`;
    h+=`<span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text4);min-width:30px">#${i+1}</span>`;
    h+=`<span style="display:flex;gap:2px">${r.hero.map(c=>cardHTML(c,'out-card')).join('')}</span>`;
    h+=`<span style="display:flex;gap:2px">${r.flop.map(c=>cardHTML(c,'out-card')).join('')}</span>`;
    h+=`<span style="flex:1;font-size:11px;color:var(--text3)">${tex?tex.label:''} / ${r.correctBet?'Bet '+r.correctSizing:'Check'}</span>`;
    h+=`<span style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:${rpct>=80?'var(--green)':rpct>=40?'var(--gold)':'var(--red)'}">${r.earned}/${r.maxPts}</span>`;
    h+=`</div>`;
  });
  h+=`</div>`;

  h+=`<div style="display:flex;gap:8px;margin-top:24px;justify-content:center">`;
  h+=`<button class="btn btn-p btn-lg" onclick="startCbetSet()">New Set</button>`;
  h+=`<button class="btn btn-s" onclick="CB.active=false;rCbet()">Back to Menu</button>`;
  h+=`</div>`;
  h+=`</div>`;
  el.innerHTML=h;
}

    h+=`<span style="font-size:11px;color:var(--text3)">${s.date}</span>`;

        h+=`<div style="display:flex;justify-content:space-between;align-items:center">`;

          const tex=BOARD_TEXTURES.find(b=>b.id===r.correctTexture);

      });

    h+=`</div>`;

function rStats(){
  const el=document.getElementById('tStats');
  const totalSets=D.sets.length;
  const totalQuestions=D.sets.reduce((s,x)=>s+x.total,0);
  const totalCorrect=D.sets.reduce((s,x)=>s+x.correct,0);
  const avgPct=totalQuestions>0?Math.round(totalCorrect/totalQuestions*100):0;

  const todayKey=td();
  const todayData=D.dailyLog[todayKey]||{sets:0,questions:0,correct:0};

  // --- A. Top Stats Bar ---
  let h=`<div class="stat-bar">`;
  h+=`<div class="stat-box"><div class="sv" data-anim="${totalSets}" data-delay="0">0</div><div class="sl">Total Sets</div></div>`;
  h+=`<div class="stat-box"><div class="sv" data-anim="${todayData.sets}" data-delay="80">0</div><div class="sl">Today</div></div>`;
  h+=`<div class="stat-box"><div class="sv" data-anim="${totalQuestions}" data-delay="160">0</div><div class="sl">Questions</div></div>`;
  h+=`<div class="stat-box"><div class="sv gold" data-anim="${avgPct}" data-delay="240" data-suffix="%">0</div><div class="sl">Accuracy</div></div>`;
  h+=`</div>`;

  // --- B+C+D Row ---
  h+=`<div class="stats-row">`;

  // --- B. Accuracy Ring ---
  const circR=54,circC=2*Math.PI*circR;
  const dashOff=circC*(1-avgPct/100);
  h+=`<div class="card"><div class="card-h"><span class="card-title">Accuracy</span></div><div class="card-body" style="display:flex;flex-direction:column;align-items:center;gap:8px">`;
  h+=`<div style="position:relative;width:130px;height:130px">`;
  h+=`<svg viewBox="0 0 130 130" width="130" height="130"><circle cx="65" cy="65" r="${circR}" fill="none" stroke="var(--bg4)" stroke-width="10"/>`;
  h+=`<circle class="mastery-ring" cx="65" cy="65" r="${circR}" fill="none" stroke="var(--accent)" stroke-width="10" stroke-linecap="round" transform="rotate(-90 65 65)" stroke-dasharray="${circC}" stroke-dashoffset="${circC}" data-target="${dashOff}"/></svg>`;
  h+=`<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">`;
  h+=`<span style="font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:800;color:var(--accent)" data-anim="${avgPct}" data-delay="300" data-suffix="%">0</span>`;
  h+=`</div></div>`;
  h+=`<div style="font-size:12px;color:var(--text3)">${totalCorrect} of ${totalQuestions} correct</div>`;
  h+=`</div></div>`;

  // --- C. Day Streak ---
  const logDates=new Set(Object.keys(D.dailyLog).filter(k=>D.dailyLog[k].sets>0));
  let streak=0;
  const today=new Date();
  for(let i=0;i<365;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const dk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(logDates.has(dk))streak++;else if(i>0)break;
  }
  const fSz=streak>=8?80:streak>=4?64:streak>=1?52:44;
  const fClr=streak>=8?'var(--red)':streak>=4?'#f97316':streak>=1?'var(--gold)':'var(--text4)';
  const fInner=streak>=4?'var(--gold)':'var(--surface)';
  const fGlow=streak>=8?'drop-shadow(0 0 12px var(--red)) drop-shadow(0 0 24px #f97316)':streak>=4?'drop-shadow(0 0 8px #f97316)':'none';
  const fMsg=streak>=8?"You're on fire!":streak>=4?'On a roll!':streak>=1?'Keep it up!':'Start your streak!';

  h+=`<div class="card"><div class="card-h"><span class="card-title">Day Streak</span></div><div class="card-body" style="display:flex;flex-direction:column;align-items:center;gap:8px">`;
  h+=`<div class="flame-anim" style="filter:${fGlow};line-height:1"><svg width="${fSz}" height="${fSz}" viewBox="0 0 64 64" fill="none"><path d="M32 4C32 4 38 16 38 24C38 28 42 28 44 24C48 32 52 40 44 52C40 56 36 58 32 58C28 58 24 56 20 52C12 40 16 32 20 24C22 28 26 28 26 24C26 16 32 4 32 4Z" fill="${fClr}" opacity=".85"/><path d="M32 20C32 20 36 28 36 34C36 40 32 46 32 46C32 46 28 40 28 34C28 28 32 20 32 20Z" fill="${fInner}" opacity=".7"/></svg></div>`;
  h+=`<div style="font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:800;color:${fClr};margin-top:4px" data-anim="${streak}" data-delay="200">0</div>`;
  h+=`<div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600">Day${streak!==1?'s':''} Streak</div>`;
  h+=`<div style="font-size:12px;color:var(--text2);font-weight:500;margin-top:2px">${fMsg}</div>`;
  h+=`</div></div>`;

  // --- D. Daily Activity (14 days) ---
  const days14=[];
  for(let i=13;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const dk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const log=D.dailyLog[dk]||{sets:0,questions:0,correct:0};
    days14.push({date:dk,day:d.getDate(),sets:log.sets,questions:log.questions,isToday:i===0});
  }
  const maxAct=Math.max(1,...days14.map(d=>d.sets+d.questions));

  h+=`<div class="card"><div class="card-h"><span class="card-title">Daily Activity</span><span style="font-size:10px;color:var(--text3)">14 days</span></div><div class="card-body">`;
  h+=`<div style="display:flex;align-items:end;gap:4px;height:100px;padding-bottom:20px;position:relative">`;
  days14.forEach((d,i)=>{
    const totalH=d.sets+d.questions;
    const setPct=maxAct>0?(d.sets/maxAct*100):0;
    const qPct=maxAct>0?(d.questions/maxAct*100):0;
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:0;position:relative">`;
    h+=`<div style="width:100%;display:flex;flex-direction:column;justify-content:end;height:80px">`;
    if(qPct>0)h+=`<div class="stat-bar-anim" style="width:100%;height:${qPct}%;background:var(--accent);border-radius:3px 3px 0 0;min-height:${d.questions>0?'3px':'0'};transform-origin:bottom;animation-delay:${i*40}ms"></div>`;
    if(setPct>0)h+=`<div class="stat-bar-anim" style="width:100%;height:${setPct}%;background:var(--gold);border-radius:${d.questions>0?'0':'3px 3px'} 0 0;min-height:${d.sets>0?'3px':'0'};transform-origin:bottom;animation-delay:${i*40+20}ms"></div>`;
    if(totalH===0)h+=`<div style="width:100%;height:3px;background:var(--bg4);border-radius:3px"></div>`;
    h+=`</div>`;
    h+=`<div style="font-size:8px;color:${d.isToday?'var(--gold)':'var(--text4)'};margin-top:4px;font-weight:${d.isToday?'700':'400'}">${d.day}</div>`;
    h+=`</div>`;
  });
  h+=`</div>`;
  h+=`<div style="display:flex;gap:14px;justify-content:center;margin-top:4px">`;
  h+=`<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3)"><span style="width:8px;height:8px;border-radius:2px;background:var(--accent);display:inline-block"></span>Questions</div>`;
  h+=`<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3)"><span style="width:8px;height:8px;border-radius:2px;background:var(--gold);display:inline-block"></span>Sets</div>`;
  h+=`</div></div></div>`;

  h+=`</div>`; // close stats-row

  // --- E. Draw Type Accuracy ---
  const drawTypeStats={};
  DRAW_TYPES.forEach(dt=>{drawTypeStats[dt.id]={correct:0,total:0};});
  D.sets.forEach(s=>{
    if(!s.results)return;
    s.results.forEach(r=>{
      // Draw selection accuracy
      const correctSet=new Set(r.drawsCorrect||[]);
      const selectedSet=new Set(r.drawsSelected||[]);
      DRAW_TYPES.forEach(dt=>{
        if(correctSet.has(dt.id)||selectedSet.has(dt.id)){
          drawTypeStats[dt.id].total++;
          if(correctSet.has(dt.id)&&selectedSet.has(dt.id))drawTypeStats[dt.id].correct++;
        }
      });
    });
  });

  const dtEntries=DRAW_TYPES.map(dt=>({
    label:dt.label,
    correct:drawTypeStats[dt.id].correct,
    total:drawTypeStats[dt.id].total,
    pct:drawTypeStats[dt.id].total>0?Math.round(drawTypeStats[dt.id].correct/drawTypeStats[dt.id].total*100):0
  }));
  const maxDT=Math.max(1,...dtEntries.map(e=>e.total));

  h+=`<div class="card"><div class="card-h"><span class="card-title">Draw Type Accuracy</span></div><div class="card-body">`;
  h+=`<div style="display:flex;align-items:end;gap:12px;height:140px;padding-bottom:28px">`;
  dtEntries.forEach((e,i)=>{
    const hPct=maxDT>0?(e.total/maxDT*100):0;
    const color=e.pct>=80?'var(--green)':e.pct>=50?'var(--gold)':'var(--red)';
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;position:relative">`;
    h+=`<div style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:${color};margin-bottom:4px" data-anim="${e.pct}" data-delay="${i*80}" data-suffix="%">0</div>`;
    h+=`<div style="width:100%;height:100px;display:flex;flex-direction:column;justify-content:end">`;
    h+=`<div class="stat-bar-anim" style="width:100%;height:${hPct}%;background:${color};border-radius:4px 4px 0 0;min-height:3px;transform-origin:bottom;animation-delay:${i*80}ms;opacity:.85"></div>`;
    h+=`</div>`;
    h+=`<div style="font-size:8px;color:var(--text3);margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;text-align:center;line-height:1.2">${e.label}</div>`;
    h+=`</div>`;
  });
  h+=`</div></div></div>`;

  // --- F. Score Distribution ---
  const scoreRanges=[{label:'90-100%',min:90,max:100},{label:'70-89%',min:70,max:89},{label:'50-69%',min:50,max:69},{label:'0-49%',min:0,max:49}];
  const scoreCounts=scoreRanges.map(r=>D.sets.filter(s=>s.score>=r.min&&s.score<=r.max).length);
  const maxScore=Math.max(1,...scoreCounts);

  h+=`<div class="card"><div class="card-h"><span class="card-title">Score Distribution</span></div><div class="card-body">`;
  h+=`<div style="display:flex;align-items:end;gap:12px;height:120px;padding-bottom:28px">`;
  scoreRanges.forEach((r,i)=>{
    const hPct=maxScore>0?(scoreCounts[i]/maxScore*100):0;
    const colors=['var(--green)','var(--accent)','var(--gold)','var(--red)'];
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;position:relative">`;
    h+=`<div style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:${colors[i]};margin-bottom:4px" data-anim="${scoreCounts[i]}" data-delay="${i*80+400}">0</div>`;
    h+=`<div style="width:100%;height:80px;display:flex;flex-direction:column;justify-content:end">`;
    h+=`<div class="stat-bar-anim" style="width:100%;height:${hPct}%;background:${colors[i]};border-radius:4px 4px 0 0;min-height:3px;transform-origin:bottom;animation-delay:${i*80+400}ms;opacity:.85"></div>`;
    h+=`</div>`;
    h+=`<div style="font-size:9px;color:var(--text3);margin-top:6px;font-weight:600">${r.label}</div>`;
    h+=`</div>`;
  });
  h+=`</div></div></div>`;

  // --- G. C-BET Stats ---
  if(D.cbetSets.length>0){
    const cbTotal=D.cbetSets.length;
    const cbEarned=D.cbetSets.reduce((s,x)=>s+(x.earned||0),0);
    const cbMax=D.cbetSets.reduce((s,x)=>s+(x.maxPts||0),0);
    const cbPct=cbMax>0?Math.round(cbEarned/cbMax*100):0;

    h+=`<div class="card"><div class="card-h"><span class="card-title">C-BET Trainer</span><span style="font-size:10px;color:var(--text3)">${cbTotal} sets</span></div><div class="card-body">`;

    // C-BET accuracy ring
    const cbR=40,cbCircC=2*Math.PI*cbR;
    const cbDash=cbCircC*(1-cbPct/100);
    h+=`<div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">`;
    h+=`<div style="position:relative;width:100px;height:100px">`;
    h+=`<svg viewBox="0 0 100 100" width="100" height="100"><circle cx="50" cy="50" r="${cbR}" fill="none" stroke="var(--bg4)" stroke-width="8"/>`;
    h+=`<circle class="mastery-ring" cx="50" cy="50" r="${cbR}" fill="none" stroke="var(--accent)" stroke-width="8" stroke-linecap="round" transform="rotate(-90 50 50)" stroke-dasharray="${cbCircC}" stroke-dashoffset="${cbCircC}" data-target="${cbDash}"/></svg>`;
    h+=`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><span style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:800;color:var(--accent)" data-anim="${cbPct}" data-delay="600" data-suffix="%">0</span></div>`;
    h+=`</div>`;

    // Texture accuracy bars
    const texStats={};
    BOARD_TEXTURES.forEach(bt=>{texStats[bt.id]={correct:0,total:0};});
    D.cbetSets.forEach(s=>{
      if(!s.results)return;
      s.results.forEach(r=>{
        if(r.correctTexture){
          texStats[r.correctTexture].total++;
          if(r.userTexture===r.correctTexture)texStats[r.correctTexture].correct++;
        }
      });
    });

    h+=`<div style="flex:1;min-width:200px">`;
    BOARD_TEXTURES.forEach(bt=>{
      const ts=texStats[bt.id];
      const tpct=ts.total>0?Math.round(ts.correct/ts.total*100):0;
      const clr=tpct>=80?'var(--green)':tpct>=50?'var(--gold)':'var(--red)';
      h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">`;
      h+=`<span style="font-size:11px;font-weight:600;min-width:70px;color:var(--text2)">${bt.label}</span>`;
      h+=`<div style="flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden">`;
      h+=`<div style="height:100%;width:${tpct}%;background:${clr};border-radius:4px;transition:width .6s"></div>`;
      h+=`</div>`;
      h+=`<span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${clr};min-width:35px;text-align:right">${tpct}%</span>`;
      h+=`</div>`;
    });
    h+=`</div></div>`;

    // Bet/Check accuracy
    let betCorrect=0,betTotal=0;
    D.cbetSets.forEach(s=>{
      if(!s.results)return;
      s.results.forEach(r=>{
        betTotal++;
        if(r.userBet===r.correctBet)betCorrect++;
      });
    });
    const betPct=betTotal>0?Math.round(betCorrect/betTotal*100):0;
    h+=`<div style="margin-top:12px;font-size:12px;color:var(--text2)">Bet/Check正答率: <strong style="color:var(--accent)">${betPct}%</strong> (${betCorrect}/${betTotal})</div>`;

    h+=`</div></div>`;
  }

  el.innerHTML=h;

  // Fire animations
  requestAnimationFrame(()=>{
    el.querySelectorAll('[data-anim]').forEach(e=>{
      const target=parseInt(e.dataset.anim)||0;
      const delay=parseInt(e.dataset.delay)||0;
      const suffix=e.dataset.suffix||'';
      setTimeout(()=>{
        const start=performance.now();
        function tick(now){
          const t=Math.min((now-start)/600,1);
          const ease=1-Math.pow(1-t,3);
          e.textContent=Math.round(target*ease)+(t>=1?suffix:'');
          if(t<1)requestAnimationFrame(tick);else e.textContent=target+suffix;
        }
        requestAnimationFrame(tick);
      },delay);
    });

    const ring=el.querySelector('.mastery-ring');
    if(ring){
      const target=parseFloat(ring.dataset.target);
      ring.style.transition='stroke-dashoffset 1s cubic-bezier(.23,1,.32,1)';
      setTimeout(()=>{ring.style.strokeDashoffset=target;},100);
    }
  });
}

  });
  h+=`</div></div>`;

  el.innerHTML=h;
}

  strengths.forEach(s=>{

  h+=`<div style="margin-top:8px;font-size:10px;color:var(--text4)">BD = バックドアドロー、Blk = フラッシュブロッカー、RA = レンジアドバンテージ</div>`;

  // Pot Type Differences
  h+=`<div class="card"><div class="card-h"><span class="card-title">ポットタイプ別の戦略</span></div><div class="card-body">`;

    {type:'Multiway',full:'マルチウェイポット',desc:'3人以上のプレイヤーがいるポット。',

  // Sizing Logic

  const szLogic=[

    {n:'2',color:'var(--red)',title:'Wet → 大きく低頻度（2/3-3/4 pot）',

  // Range Advantage
  h+=`<div class="card"><div class="card-h"><span class="card-title">レンジアドバンテージ</span></div><div class="card-body">`;

  h+=`<div style="font-size:11px;color:var(--text3)">ロウ＆コネクトボード。BBのワイドレンジ（87s, 65s等）がヒットしやすい。レイザーのAK等が空振り。</div>`;

  h+=`<div style="overflow-x:auto">`;

  h+=`<th style="padding:8px 6px;color:var(--text3);font-weight:700;text-align:left">フォールドさせられるドロー</th>`;

    h+=`<td style="padding:8px 6px;text-align:center;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--red)">${s.pct}</td>`;

  h+=`<div style="margin-top:8px;padding:8px;background:var(--bg2);border-radius:6px;font-size:11px;color:var(--text3)">`;
  h+=`<strong>考え方:</strong> 相手のドローのエクイティ > 与えたオッズ → 相手のコールは正しい（=あなたのベットサイズが小さすぎる）。逆に、ドローのエクイティ < 与えたオッズ → 相手のコールは間違い（=あなたのベットサイズは正しい）。`;
  h+=`</div>`;
  h+=`</div></div>`;

  // Glossary
  h+=`<div class="card"><div class="card-h"><span class="card-title">用語解説</span></div><div class="card-body">`;
  const cbTerms=[
    {term:'C-bet',def:'Continuation Bet。プリフロップレイザーがフロップで続けてベットすること。'},
    {term:'SRP',def:'Single Raised Pot。プリフロップでオープンレイズ→コールの一般的なポット。'},
    {term:'3BET Pot',def:'プリフロップで3bet(リレイズ)が入ったポット。SPRが低く、レンジが狭い。'},
    {term:'SPR',def:'Stack to Pot Ratio。スタック÷ポット。低いほどオールインに近づきやすい。'},
    {term:'ボードテクスチャ',def:'フロップの特性（Dry/Semi-wet/Wet/Monotone/Paired）。C-bet戦略の最重要判断基準。'},

    h+=`<div style="font-size:12px;color:var(--text2);margin-top:2px">${t.def}</div>`;
    h+=`</div>`;

  h+=`</div></div>`;

  el.innerHTML=h;
}

(function init(){
  load();
  initTheme();
  resetGame();
  resetCbet();
  const savedTab=localStorage.getItem(SK.TAB);
  if(savedTab && TABS.some(t=>t.id===savedTab))curTab=savedTab;
  initTabs();
  switchTab(curTab);
  document.getElementById('themeBtn').onclick=toggleTheme;

  // skillme integration
